# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cvapp}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Password123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:de39yvgqp}
cloudinary.api-key=${CLOUDINARY_API_KEY:449969984556924}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:gz0-bqBCkjsHRYWhsoL8e7eYhak}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Admin credentials (override in prod with env vars)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# CORS allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

#Port
server.port=${PORT:8080}
